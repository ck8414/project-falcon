<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="320" viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg">

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- G&C Capital — Circular Seal Logo                                    -->
  <!-- Seal mark + wordmark  ·  Dark (navy) left  ·  Light (white) right  -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <defs>
    <!-- Dark panel: seal center (165, 160), arc radius 117 -->
    <path id="arc-top-d" d="M 48,160 A 117,117 0 0 1 282,160"/>
    <path id="arc-bot-d" d="M 282,160 A 117,117 0 0 1 48,160"/>

    <!-- Light panel: seal center (865, 160), arc radius 117 -->
    <path id="arc-top-l" d="M 748,160 A 117,117 0 0 1 982,160"/>
    <path id="arc-bot-l" d="M 982,160 A 117,117 0 0 1 748,160"/>
  </defs>


  <!-- ── DARK VERSION ──────────────────────────────────── 0–700 ──── -->
  <rect x="0" y="0" width="700" height="320" fill="#0B1D51"/>

  <!-- Seal mark: center (165, 160) -->
  <!-- Outer disc + gold outer ring -->
  <circle cx="165" cy="160" r="128" fill="#0B1D51"/>
  <circle cx="165" cy="160" r="128" fill="none" stroke="#C9A84C" stroke-width="3"/>
  <!-- Second gold ring (inset) -->
  <circle cx="165" cy="160" r="112" fill="none" stroke="#C9A84C" stroke-width="1.4"/>
  <!-- Inner dark disc -->
  <circle cx="165" cy="160" r="91"  fill="#121E50"/>
  <!-- Thin inner accent ring -->
  <circle cx="165" cy="160" r="78"  fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>

  <!-- GC monogram centered -->
  <text x="165" y="160"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50" font-weight="700"
    fill="#C9A84C" text-anchor="middle" dominant-baseline="central">GC</text>

  <!-- Arc text: top — "· G & C  CAPITAL ·" -->
  <text font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700"
    fill="#C9A84C" letter-spacing="3.8">
    <textPath href="#arc-top-d" startOffset="50%" text-anchor="middle">· G &amp; C  CAPITAL ·</textPath>
  </text>

  <!-- Arc text: bottom — "· HOLDINGS LLC ·" -->
  <text font-family="Arial, Helvetica, sans-serif"
    font-size="9.5" font-weight="400"
    fill="#8AABCC" letter-spacing="3.2">
    <textPath href="#arc-bot-d" startOffset="50%" text-anchor="middle">· HOLDINGS LLC ·</textPath>
  </text>

  <!-- Divider between seal and wordmark -->
  <line x1="308" y1="60" x2="308" y2="258" stroke="#C9A84C" stroke-width="0.9" opacity="0.4"/>

  <!-- Wordmark: G&C, centered in right region (308–700), center x=504 -->
  <!-- G at x=421, & at x=479, C at x=531 -->
  <text x="421" y="185"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82" font-weight="700" fill="#FFFFFF">G</text>
  <text x="480" y="180"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="70" font-weight="400" font-style="italic" fill="#C9A84C">&amp;</text>
  <text x="534" y="185"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82" font-weight="700" fill="#FFFFFF">C</text>

  <!-- Gold rule under G&C -->
  <rect x="328" y="200" width="350" height="1.6" fill="#C9A84C" opacity="0.65"/>

  <!-- CAPITAL — stacked, centered at x=503 -->
  <text x="503" y="232"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17" font-weight="300"
    fill="#C9A84C" letter-spacing="13"
    text-anchor="middle">CAPITAL</text>

  <!-- HOLDINGS LLC -->
  <text x="503" y="256"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" font-weight="400"
    fill="#8AABCC" letter-spacing="7"
    text-anchor="middle">HOLDINGS LLC</text>


  <!-- ── LIGHT VERSION ─────────────────────────────── 700–1400 ──── -->
  <rect x="700" y="0" width="700" height="320" fill="#FFFFFF"/>

  <!-- Seal mark: center (865, 160) — navy disc on white bg -->
  <circle cx="865" cy="160" r="128" fill="#0B1D51"/>
  <circle cx="865" cy="160" r="128" fill="none" stroke="#C9A84C" stroke-width="3"/>
  <circle cx="865" cy="160" r="112" fill="none" stroke="#C9A84C" stroke-width="1.4"/>
  <circle cx="865" cy="160" r="91"  fill="#121E50"/>
  <circle cx="865" cy="160" r="78"  fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>

  <!-- GC monogram -->
  <text x="865" y="160"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50" font-weight="700"
    fill="#C9A84C" text-anchor="middle" dominant-baseline="central">GC</text>

  <!-- Arc text: top -->
  <text font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700"
    fill="#C9A84C" letter-spacing="3.8">
    <textPath href="#arc-top-l" startOffset="50%" text-anchor="middle">· G &amp; C  CAPITAL ·</textPath>
  </text>

  <!-- Arc text: bottom -->
  <text font-family="Arial, Helvetica, sans-serif"
    font-size="9.5" font-weight="400"
    fill="#8AABCC" letter-spacing="3.2">
    <textPath href="#arc-bot-l" startOffset="50%" text-anchor="middle">· HOLDINGS LLC ·</textPath>
  </text>

  <!-- Divider -->
  <line x1="1008" y1="60" x2="1008" y2="258" stroke="#C9A84C" stroke-width="0.9" opacity="0.4"/>

  <!-- Wordmark: G&C centered in right region (1008–1400), center x=1204 -->
  <!-- Offset: 421+700=1121, 480+700=1180, 534+700=1234 -->
  <text x="1121" y="185"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82" font-weight="700" fill="#0B1D51">G</text>
  <text x="1180" y="180"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="70" font-weight="400" font-style="italic" fill="#C9A84C">&amp;</text>
  <text x="1234" y="185"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82" font-weight="700" fill="#0B1D51">C</text>

  <!-- Gold rule -->
  <rect x="1028" y="200" width="350" height="1.6" fill="#C9A84C" opacity="0.65"/>

  <!-- CAPITAL -->
  <text x="1203" y="232"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17" font-weight="300"
    fill="#0B1D51" letter-spacing="13"
    text-anchor="middle">CAPITAL</text>

  <!-- HOLDINGS LLC -->
  <text x="1203" y="256"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" font-weight="400"
    fill="#94A3B8" letter-spacing="7"
    text-anchor="middle">HOLDINGS LLC</text>

</svg>
